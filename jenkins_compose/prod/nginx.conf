events {
    worker_connections 1024;
}

http {
    upstream jenkins {
        server jenkins:8080;
    }

    # HTTP - Redirect all to HTTPS
    server {
        listen 80;
        server_name mjenkins.kingcloud.live;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }
    # HTTPS - mjenkins.kingcloud.live (jenkins server)
    server {
        listen 443 ssl;
        http2 on;
        server_name mjenkins.kingcloud.live;

        ssl_certificate /etc/letsencrypt/live/mjenkins.kingcloud.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mjenkins.kingcloud.live/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        location / {
            proxy_pass http://jenkins;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}